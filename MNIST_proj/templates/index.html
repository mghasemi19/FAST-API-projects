<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MNIST Digit Predictor</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="page">

<div class="card">

<h1>MNIST Digit Predictor</h1>

<p class="subtitle">
Upload an image of a handwritten digit and let the AI predict the number.
</p>

<form action="/predict-image/" method="post" enctype="multipart/form-data">

<div class="upload-box">
<label>Select an image</label>
<input type="file" name="file" accept="image/png,image/jpeg" required>
</div>

<button type="submit">Predict Digit</button>

</form>

{% if result is not none %}

<div class="result">

<h2>Prediction: {{ result }}</h2>

<h3>Model prediction probability: {{ prob }}%</h3>

<img src="data:image/png;base64,{{ image }}" alt="Uploaded image"></br>

<a href="/">Go Back</a>


</div>

{% endif %}

<div class="footer">
FastAPI + TensorFlow Demo
</div>

</div>

</div>

</body>
</html>
